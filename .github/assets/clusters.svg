<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 168" width="1200" height="168" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="The eight command clusters, one color per family">
  <rect x="0.5" y="0.5" width="1199" height="167" rx="16" fill="#0b0d0e" stroke="#262c2f"/>

