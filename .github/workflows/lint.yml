name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-commands:
    name: Lint command files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x ./scripts/lint-commands.sh ./scripts/build-agent-skills.sh

      - name: Run command lint (includes skills drift check)
        run: ./scripts/lint-commands.sh --verbose

  validate-skills-spec:
    name: Validate skills against open Agent Skills spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install skills-ref (pinned)
        # Pinned to a known-good agentskills/agentskills SHA. Bump intentionally
        # after reading the upstream changelog; never auto-bump.
        run: |
          pip install --upgrade pip
          pip install "git+https://github.com/agentskills/agentskills.git@2d3e01f590f68bee2cb76a3200823e93b2cc9eaa#subdirectory=skills-ref"

      - name: Validate every skill
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          total=0
          for d in .claude/skills/*/; do
            total=$((total + 1))
            name="$(basename "$d")"
            if skills-ref validate "$d"; then
              echo "PASS: $name"
            else
              echo "FAIL: $name"
              fail=$((fail + 1))
            fi
          done
          echo "skills-ref validate: $((total - fail)) passed / $total total"
          if [[ "$fail" -gt 0 ]]; then
            echo "::error::$fail skill(s) failed Agent Skills spec validation"
            exit 1
          fi

  structural-evals:
    name: Structural evals (automatable scenario subset)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run structural evals
        # Asserts the repo invariants a subset of the eval scenarios depend on
        # (handoff basenames, count markers, registry membership, corpus
        # integrity, etc.). Does NOT run a model; the behavioral scenarios stay
        # manual (evals/scripts/run-evals.sh). Exit 1 on any broken invariant.
        run: python3 ./evals/scripts/structural-evals.py

  lint-shellcheck:
    name: Shellcheck on bash scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        # Pinned per CONTRIBUTING's action-pinning rule (no mutable refs).
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'
          # Gate on errors only; warning-level findings (SC2034 unused vars, style)
          # are advisory per DECISIONS.md D-3. SC2088/SC2115 tracked as follow-ups.
          severity: error

  check-doc-sync:
    name: Doc-sync and WOS reference integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x ./scripts/check-doc-sync.sh

      - name: Run doc-sync + WOS section/anchor reference integrity
        # Verifies command / ADR / wos-topic refs resolve, plus (N3, 2026-07-18)
        # that every cited WORKFLOW_OPERATING_SYSTEM.md `## section` / `### anchor`
        # in the active-contract surfaces resolves to a real heading. Catches the
        # silent-failure mode of a spec refactor that lint-commands cannot.
        run: ./scripts/check-doc-sync.sh